name: Telegram AI Tech Bot

on:
  schedule:
    # Московское время (UTC+3): 6, 10, 12, 15, 18, 21, 24
    # Соответствующие UTC часы: 3, 7, 9, 12, 15, 18, 21
    - cron: '0 3,7,9,12,15,18,21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post_news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Debug - before
        run: |
          echo "📂 До запуска:"
          ls -la *.db 2>/dev/null || echo "БД не существует"
          if [ -f posted_articles.db ]; then
            sqlite3 posted_articles.db "SELECT COUNT(*) || ' записей в БД' FROM posted_articles;" 2>/dev/null || echo "Таблица пуста"
          fi

      - name: Run bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python telegrambot.py

      - name: Debug - after
        run: |
          echo "📂 После запуска:"
          ls -la *.db 2>/dev/null || echo "БД не существует"
          if [ -f posted_articles.db ]; then
            echo "=== Последние 5 записей ==="
            sqlite3 posted_articles.db "SELECT id, substr(title,1,50) || '...', posted_date FROM posted_articles ORDER BY id DESC LIMIT 5;"
            echo "=== Всего записей ==="
            sqlite3 posted_articles.db "SELECT COUNT(*) FROM posted_articles;"
          fi

      - name: Commit state
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add posted_articles.db 2>/dev/null || true
          git add ai_poster.log 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🤖 Update database [skip ci]"
          git push || (git pull --rebase && git push)
